name: Takeover Stale Orders

on:
  schedule:
    - cron: '*/15 * * * *' # Every 15 minutes
  workflow_dispatch: # Allows manual trigger

jobs:
  run-takeover:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Order Timeout API
        run: |
          curl -X GET "https://intrustindia.com/api/cron/order-timeout" \
          -H "Accept: application/json"
