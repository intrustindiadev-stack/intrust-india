name: Takeover Stale Orders

on:
  schedule:
    - cron: '*/15 * * * *' # Every 15 minutes
  workflow_dispatch: # Allows manual trigger

jobs:
  run-takeover:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Order Timeout API
        run: |
          curl -f -X GET "https://intrustindia.com/api/cron/order-timeout" \
          -H "Accept: application/json" \
          -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
          --max-time 120 \
          --connect-timeout 10
