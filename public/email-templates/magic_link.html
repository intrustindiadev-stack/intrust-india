<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Your InTrust India Login Code</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #f4f4f5; margin: 0; padding: 40px 0; color: #18181b; }
        .container { max-width: 500px; margin: 0 auto; background: #ffffff; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        .header { background: #000000; padding: 30px; text-align: center; color: #ffffff; }
        .header h1 { margin: 0; font-size: 24px; font-weight: 600; }
        .content { padding: 40px 30px; text-align: center; }
        .content p { font-size: 16px; line-height: 1.5; margin: 0 0 20px 0; color: #3f3f46; }
        .code-box { background: #f4f4f5; border-radius: 6px; padding: 20px; font-size: 32px; font-weight: 700; letter-spacing: 4px; color: #000000; margin: 0 auto 20px auto; max-width: 200px; }
        .footer { padding: 20px 30px; text-align: center; font-size: 13px; color: #71717a; border-top: 1px solid #e4e4e7; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>InTrust India</h1>
        </div>
        <div class="content">
            <p>Welcome! Here is your secure 6-digit login code.</p>
            <div class="code-box">{{ .Token }}</div>
            <p style="font-size: 14px; color: #71717a;">Enter this code on the login page to verify your identity. This code expires shortly.</p>
        </div>
        <div class="footer">
            If you did not request this code, you can safely ignore this email.<br>
            &copy; InTrust India
        </div>
    </div>
</body>
</html>
